<!DOCTYPE html>
<html>
<head>
<title>TechFlow</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* Layout */

.main{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:200px;
background:#333;
color:white;
padding-top:20px;
}

/* TechFlow Title */

.logo{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

/* Sidebar Links */

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:blue;
}

/* Content */

.content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Login Box */

.container{
width:300px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

.container h2{
text-align:center;
}

input[type=text],
input[type=password]{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid gray;
border-radius:5px;
}

input[type=submit]{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

input[type=submit]:hover{
background:darkblue;
}

</style>
</head>

<body>

<div class="main">

<div class="sidebar">

<div class="logo">
TechFlow
</div>

<a href="">Login</a>
<a href="lab task-2.html">Registration</a>

</div>

<div class="content">

<div class="container">
<h2>Login</h2>

<form>
    <label>Email Address</label>
<input type="text" >
 <label>password</label>
<input type="password" >
<input type="submit" value="Login">
</form>

</div>

</div>

</div>

</body>
</html>
